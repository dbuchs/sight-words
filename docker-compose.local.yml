services:
  web:
    build: .
    container_name: sight-words-local
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    environment:
      AWS_REGION: ${AWS_REGION:-us-east-2}
      DYNAMODB_STUDENTS_TABLE: ${DYNAMODB_STUDENTS_TABLE:-sight_words_students}
      DYNAMODB_PROGRESS_TABLE: ${DYNAMODB_PROGRESS_TABLE:-sight_words_progress}
      DYNAMODB_META_TABLE: ${DYNAMODB_META_TABLE:-sight_words_meta}
      SQLITE_MIGRATION_PATH: ${SQLITE_MIGRATION_PATH:-}
    restart: unless-stopped

