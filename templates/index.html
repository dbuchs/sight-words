<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sight Words – Let's Read!</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <span class="logo">⭐ Sight Words</span>
      <a class="teacher-link" href="/teacher">Teacher View 📋</a>
    </div>
  </header>

  <main id="app">

    <!-- ── START SCREEN ── -->
    <section id="start-screen" class="card screen">
      <div class="mascot">🦉</div>
      <h1>Let's Learn New Words!</h1>
      <p>Listen, read, and click the right word!</p>

      <!-- Student selector -->
      <div class="student-select-wrap">
        <label for="student-select" class="student-label">Who's learning today?</label>
        <div class="student-row">
          <select id="student-select" class="student-select">
            {% for s in students %}
            <option value="{{ s.id }}" data-has-pin="{{ 'true' if s.has_pin else 'false' }}">{{ s.name }}</option>
            {% endfor %}
            {% if not students %}
            <option value="" disabled selected>No students yet</option>
            {% endif %}
          </select>
          <button id="btn-add-student" class="btn-secondary btn-sm" title="Add new student">＋ New</button>
        </div>
        <div id="new-student-form" class="new-student-form hidden">
          <input id="new-student-name" type="text" placeholder="Student name" class="student-input" maxlength="40" />
          <input id="new-student-pin" type="password" placeholder="PIN (optional)" class="student-input pin-input" maxlength="8" inputmode="numeric" />
          <button id="btn-save-student" class="btn-primary btn-sm">Save</button>
          <button id="btn-cancel-student" class="btn-secondary btn-sm">Cancel</button>
        </div>
      </div>

      <button id="btn-start" class="btn-primary big-btn">Start Learning ▶</button>
    </section>

    <!-- ── PIN SCREEN ── -->
    <section id="pin-screen" class="card screen hidden">
      <div class="mascot">🔒</div>
      <h2 id="pin-student-name">Enter PIN</h2>
      <p class="pin-hint">Ask a grown-up to enter the PIN.</p>
      <div class="pin-dots" id="pin-dots">
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
      </div>
      <div class="pin-keypad">
        <button class="pin-key" data-digit="1">1</button>
        <button class="pin-key" data-digit="2">2</button>
        <button class="pin-key" data-digit="3">3</button>
        <button class="pin-key" data-digit="4">4</button>
        <button class="pin-key" data-digit="5">5</button>
        <button class="pin-key" data-digit="6">6</button>
        <button class="pin-key" data-digit="7">7</button>
        <button class="pin-key" data-digit="8">8</button>
        <button class="pin-key" data-digit="9">9</button>
        <button class="pin-key pin-key-clear" id="pin-clear">⌫</button>
        <button class="pin-key" data-digit="0">0</button>
        <button class="pin-key pin-key-ok" id="pin-ok">OK</button>
      </div>
      <p id="pin-error" class="pin-error hidden">Wrong PIN. Try again.</p>
      <button id="btn-pin-back" class="btn-secondary btn-sm" style="margin-top:.5rem">← Back</button>
    </section>

    <!-- ── LESSON SCREEN ── -->
    <section id="lesson-screen" class="card screen hidden">

      <!-- Progress bar -->
      <div class="lesson-header">
        <span id="phase-label" class="phase-badge">Listen</span>
        <div class="sight-word-badge">
          Word of the day: <strong id="sight-word-display"></strong>
        </div>
      </div>

      <!-- Sentence display -->
      <div id="sentence-area">
        <p id="sentence-text" class="sentence"></p>
      </div>

      <!-- Audio loading indicator -->
      <div id="audio-pending" class="audio-pending hidden">
        <span class="ap-loading"><span class="audio-spinner"></span>Loading audio…</span>
        <span class="ap-playing">🔊 Playing…</span>
        <span class="ap-done">✅ Done!</span>
      </div>

      <!-- Status / instructions -->
      <div id="instruction-area" class="instruction-box"></div>

      <!-- Feedback overlay -->
      <div id="feedback" class="feedback hidden"></div>

      <!-- Control buttons -->
      <div class="btn-row">
        <button id="btn-replay" class="btn-secondary hidden">🔊 Replay</button>
        <button id="btn-next" class="btn-primary hidden">Next ➜</button>
      </div>

      <!-- Phase dots -->
      <div class="phase-dots">
        <span class="dot" id="dot-0"></span>
        <span class="dot" id="dot-1"></span>
        <span class="dot" id="dot-2"></span>
        <span class="dot" id="dot-3"></span>
      </div>
    </section>

    <!-- ── COMPLETE SCREEN ── -->
    <section id="complete-screen" class="card screen hidden">
      <div class="mascot">🎉</div>
      <h2>Great job!</h2>
      <div id="round-summary"></div>
      <button id="btn-again" class="btn-primary big-btn">Next Lesson ▶</button>
    </section>

  </main>

  <!-- Audio element for OpenAI TTS -->
  <audio id="tts-audio"></audio>

  <script src="/static/js/app.js"></script>
</body>
</html>
